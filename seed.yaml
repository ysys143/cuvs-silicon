evaluation_principles:
- name: API compatibility
  description: FAISS v1.8.0 gpu/cuvs/ compiles and TestGpuIndexCagra passes
  weight: 0.25
- name: Search correctness
  description: recall@10 >= 0.90 on SIFT-1M float32 L2
  weight: 0.20
- name: Benchmark reproducibility
  description: All parameters fixed and reported
  weight: 0.15
- name: Performance vs baselines
  description: Metal GPU QPS > CPU HNSW; beats Faiss-mlx on recall QPS and p99
  weight: 0.20
- name: Architecture fit
  description: No CUDA RAFT MLX deps; Metal Compute Shaders for beam search
  weight: 0.10
- name: TDD compliance
  description: Each AC has a prior failing test; Metal path tests assert GPU dispatch;
    no implementation without Red phase evidence
  weight: 0.10
exit_conditions:
- name: Full pass
  description: FAISS integration, correctness, and performance vs both baselines all satisfied
  criteria: TestGpuIndexCagra passes; recall@10 >= 0.90; Metal GPU QPS > CPU HNSW;
    cuvs-silicon beats Faiss-mlx on recall QPS and p99
- name: Scope complete
  description: All MVP API components are implemented and FAISS integration test passes
  criteria: build search index_params search_params raft::resources header-only shim
    all implemented; FAISS v1.8.0 integration test passes
- name: Stop for redesign
  description: Core cuVS API compatibility strategy is invalidated by CUDA type dependency
  criteria: FAISS v1.8.0 cuVS integration cannot be satisfied without CUDA-specific
    types that cannot be abstracted for Apple Silicon unified memory
